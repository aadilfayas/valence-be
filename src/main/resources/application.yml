spring:
  application:
    name: valence

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    properties:
      hibernate:
        format_sql: false

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

jwt:
  secret: ${JWT_SECRET:valence-default-dev-secret-key-replace-in-production-min256bit}
  expiry-ms: ${JWT_EXPIRY_MS:86400000}

spotify:
  client-id: ${SPOTIFY_CLIENT_ID}
  client-secret: ${SPOTIFY_CLIENT_SECRET}
  featured-playlist-id: ${SPOTIFY_FEATURED_PLAYLIST_ID:}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://valence-ui.vercel.app}

app:
  seed:
    email: ${SEED_USER_EMAIL:}
    password: ${SEED_USER_PASSWORD:}
    display-name: ${SEED_USER_DISPLAY_NAME:Admin}

logging:
  level:
    com.valence: INFO
    org.hibernate.SQL: WARN
