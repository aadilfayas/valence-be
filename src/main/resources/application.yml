spring:
  application:
    name: valence

  datasource:
    url: jdbc:postgresql://localhost:5432/valence
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

jwt:
  secret: valence-local-dev-secret-key-must-be-256-bits-long-for-hs256
  expiry-ms: 86400000

spotify:
  client-id: placeholder
  client-secret: placeholder

logging:
  level:
    com.valence: DEBUG
    org.hibernate.SQL: DEBUG
